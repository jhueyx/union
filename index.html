<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary SEO -->
    <title>Sally &amp; Jason</title>
    <meta name="description" content="A celebration, thoughtfully designed. Our wedding website is currently being prepared as we finalize the details." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sallyjason.com/" />
    <meta property="og:title" content="Sally &amp; Jason" />
    <meta property="og:description" content="A celebration, thoughtfully designed." />
    <meta property="og:image" content="https://sallyjason.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sally &amp; Jason" />
    <meta name="twitter:description" content="A celebration, thoughtfully designed." />
    <meta name="twitter:image" content="https://sallyjason.com/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://sallyjason.com/" />

    <!-- Fonts: Inter (weights 200–500) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@200;300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent background flash before CSS loads -->
    <style>
      html {
        background: #0a0a0a;
      }
      @media (prefers-color-scheme: light) {
        html {
          background: #fafafa;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
